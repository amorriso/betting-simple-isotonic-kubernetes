apiVersion: batch/v1
kind: CronJob
metadata:
  name: simple-isotonic-cronjob-initial-fetch
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      activeDeadlineSeconds: 3600
      template:
        spec:
          containers:
          - name: simple-isotonic-initial-fetch
            image: 192.168.1.104:30002/simple-isotonic-scheduler:<GIT_COMMIT_PLACEHOLDER>
            imagePullPolicy: Always
            env:
            - name: METHOD
              valueFrom:
                configMapKeyRef:
                  name: simple-isotonic-config
                  key: SIMPLE_ISOTONIC_METHOD_INITIAL_FETCH
            - name: CPU_COUNT
              valueFrom:
                configMapKeyRef:
                  name: simple-isotonic-config
                  key: CPU_COUNT
            - name: JOB_CPU_REQUEST
              valueFrom:
                configMapKeyRef:
                  name: simple-isotonic-config
                  key: JOB_CPU_REQUEST
            - name: SCHEDULER_TICK_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: simple-isotonic-config
                  key: SCHEDULER_TICK_SECONDS
            - name: JOB_SPAWN_LEAD_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: simple-isotonic-config
                  key: JOB_SPAWN_LEAD_SECONDS
            - name: DATABASE_PORT
              value: "5432"
            - name: GIT_COMMIT
              value: "<GIT_COMMIT_PLACEHOLDER>"
            - name: SELF_IMAGE
              value: "192.168.1.104:30002/simple-isotonic-scheduler:<GIT_COMMIT_PLACEHOLDER>"
            envFrom:
            - secretRef:
                name: database-credentials
            resources:
              requests:
                cpu: "1"
                memory: "1024Mi"
              limits:
                cpu: "1"
                memory: "4096Mi"
          restartPolicy: OnFailure
